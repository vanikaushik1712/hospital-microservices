spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Routes
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=patient-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://patient-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/patients/**

spring.cloud.gateway.server.webmvc.routes[2].id=doctor-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://doctor-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/doctors/**

spring.cloud.gateway.server.webmvc.routes[3].id=appointment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://appointment-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/appointments/**

# CORS
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-headers=*